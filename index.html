    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #060d1a; color: #e8f4f8; min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0d1526; }
    ::-webkit-scrollbar-thumb { background: #1f2d4a; border-radius: 3px; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.12); outline: none; width: 100%; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; cursor: pointer; border: none; }
    input[type=text], input[type=search] { outline: none; }
    button { cursor: pointer; transition: opacity 0.15s, transform 0.1s; border: none; }
    button:active { transform: scale(0.97); }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.80) translateY(30px) rotateX(8deg); }
      to   { opacity: 1; transform: scale(1) translateY(0) rotateX(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(250,204,21,0.4)); }
      50%       { filter: drop-shadow(0 0 22px rgba(250,204,21,0.9)); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes barGrow { from { width: 0; } }

    .card-enter { animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .legend-glow { animation: pulseGlow 2s ease-in-out 0.6s 3; }
    .bar-grow { animation: barGrow 0.6s ease-out forwards; }

    .collection-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
    .collection-scroll::-webkit-scrollbar { height: 4px; }

    .suggestion-item:hover { background: rgba(255,255,255,0.08); }
    .format-btn:hover { opacity: 0.85; }
    .gen-btn:hover { filter: brightness(1.1); }
    .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .tab-nav-btn {
      padding: 11px 22px; font-size: 13px; font-weight: 700;
      border: none; border-bottom: 2px solid transparent;
      background: transparent; color: #6b7280;
      transition: color 0.2s, border-color 0.2s; letter-spacing: 0.3px;
    }
    .tab-nav-btn:hover { color: #9ca3af; border-bottom-color: rgba(255,255,255,0.15); transform: none; }
    .tab-nav-btn.active { color: #818cf8; border-bottom-color: #6366f1; }

    .db-row { transition: background 0.12s; cursor: pointer; }
    .db-row:hover { background: rgba(255,255,255,0.055) !important; }

    .design-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 16px 18px;
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════════════════
   UTILITY FUNCTIONS
═══════════════════════════════════════════════════════════════ */
function findPlayer(query) {
  const q = query.toLowerCase().trim();
  if (!q) return null;
  return (
    PLAYERS.find(p => p.name.toLowerCase() === q) ||
    PLAYERS.find(p => p.name.toLowerCase().startsWith(q)) ||
    PLAYERS.find(p => p.name.toLowerCase().includes(q)) ||
    PLAYERS.find(p => p.name.split(' ').some(part => part.toLowerCase().startsWith(q))) ||
    null
  );
}

function getSuggestions(query) {
  const q = query.toLowerCase().trim();
  if (q.length < 2) return [];
  return PLAYERS.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.country.toLowerCase().includes(q) ||
    p.code.toLowerCase().includes(q)
  ).slice(0, 7);
}

function getYearFactor(player, year) {
  const [start, end] = player.ay;
  const [ps, pe]     = player.py;
  // Bug fixes (confirmed by unit tests in tests.js):
  // 1. `year < start` (was `year < start - 1`)
  // 2. `year > end + 3` (was `year > end + 4`)
  // 3. factor rounded to 2dp to eliminate floating-point noise
  if (year < start)   return { factor:0.45, badge:'PRE-CAREER',  note:'Before international debut' };
  if (year > end + 3) return { factor:0.28, badge:'RETIRED',     note:'Post-retirement era' };
  if (year > end)     return { factor:0.50, badge:'LATE CAREER', note:'Final / post-peak seasons' };
  if (year >= ps && year <= pe) return { factor:1.0, badge:'PEAK', note:'Peak performance years' };
  if (year < ps) {
    const d = ps - year;
    return { factor:parseFloat(Math.max(0.68, 1 - d * 0.06).toFixed(2)), badge:'RISING',   note:`${d} year${d>1?'s':''} before peak` };
  }
  const d = year - pe;
  return { factor:parseFloat(Math.max(0.58, 1 - d * 0.07).toFixed(2)), badge:'VETERAN', note:`${d} year${d>1?'s':''} post-peak` };
}

function buildCard(player, format, year, userWeights) {
  const fc  = FORMAT_CONFIG[format];
  const yf  = getYearFactor(player, year);
  const fo  = player.fo[format] || {};

  const raw = {
    avg:  fo.avg  ?? player.p.avg,
    sr:   fo.sr   ?? player.p.sr,
    bnd:  fo.bnd  ?? player.p.bnd,
    icc:  fo.icc  ?? player.p.icc,
    pop:  fo.pop  ?? player.p.pop,
    rr:   fo.rr   ?? player.p.rr,
    oq:   fo.oq   ?? player.p.oq,
    pace: fo.pace ?? player.p.pace,
    spin: fo.spin ?? player.p.spin,
    form: fo.form ?? player.p.form,
  };

  const pm  = fc.pm;
  const eff = {
    avg:  Math.min(100, raw.avg  * (pm.avg  || 1)),
    sr:   Math.min(100, raw.sr   * (pm.sr   || 1)),
    bnd:  Math.min(100, raw.bnd  * (pm.bnd  || 1)),
    icc:  raw.icc,
    pop:  Math.min(100, raw.pop  * (pm.pop  || 1)),
    rr:   raw.rr,
    oq:   Math.min(100, raw.oq   * (pm.oq   || 1)),
    pace: raw.pace,
    spin: raw.spin,
    form: Math.min(100, raw.form * (pm.form || 1) * yf.factor),
  };

  const scores = {
    careerOutput:     eff.avg * fc.sw.avg + eff.sr * fc.sw.sr + eff.bnd * fc.sw.bnd,
    peakICC:          eff.icc,
    popularity:       eff.pop,
    roleReliability:  eff.rr,
    oppositionQuality:eff.oq,
    matchupProfile:   (eff.pace + eff.spin) / 2,
    currentForm:      eff.form,
  };

  const weights = { ...fc.weights, ...userWeights };
  const total   = PILLAR_KEYS.reduce((s, k) => s + (weights[k] || 0), 0) || 1;
  const raw_ovr = PILLAR_KEYS.reduce((s, k) => s + scores[k] * (weights[k] || 0) / total, 0);
  const ovr     = Math.round(60 + (raw_ovr * (player.iw || 1)) / 100 * 39);

  return { player, format, year, scores, eff, weights, yf, ovr, fc };
}

/* ═══════════════════════════════════════════════════════════════
   LEAGUE ELIGIBILITY RULES
   BCCI prohibits Indian players from participating in any foreign
   domestic T20 league. BBL, PSL and SA20 are therefore restricted.
═══════════════════════════════════════════════════════════════ */
const FORMAT_RESTRICTIONS = {
  BBL:  { excludeCountries:['India'], note:'BCCI rules prohibit Indian players from participating in the BBL.' },
  PSL:  { excludeCountries:['India'], note:'BCCI rules and bilateral relations prohibit Indian players from the PSL.' },
  SA20: { excludeCountries:['India'], note:'BCCI rules prohibit Indian players from participating in SA20.' },
};

function isPlayerEligible(player, format) {
  const r = FORMAT_RESTRICTIONS[format];
  if (!r) return { ok:true, reason:'' };
  if (r.excludeCountries && r.excludeCountries.includes(player.country)) {
    return { ok:false, reason:`${player.name} cannot play in ${format}. ${r.note}` };
  }
  return { ok:true, reason:'' };
}

          <button onClick={onReset} style={{ flex:1,padding:'9px',fontSize:12,fontWeight:600,borderRadius:7,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#e5e7eb' }}>
            ↺ Format defaults
          </button>
          <button onClick={() => onChange('popularity', 0)} style={{ flex:1,padding:'9px',fontSize:12,fontWeight:600,borderRadius:7,background:'rgba(249,115,22,0.08)',border:'1px solid rgba(249,115,22,0.2)',color:'#f97316' }}>
            ☆ Zero popularity
          </button>
        </div>
        <div style={{ marginTop:16,fontSize:11,color:'#374151',lineHeight:1.7,padding:'12px 14px',background:'rgba(255,255,255,0.02)',borderRadius:8,border:'1px solid rgba(255,255,255,0.04)' }}>
          <div style={{ color:'#4b5563',fontWeight:700,letterSpacing:1,marginBottom:5,fontSize:10 }}>FORMAT NOTE</div>
          <div>Switching format resets to that format's default weights. {FORMAT_CONFIG[format].label} favours: <strong style={{ color:'#9ca3af' }}>{
            format === 'Test' ? 'Career Output (avg-heavy) + Peak ICC' :
            format === 'IPL'  ? 'SR/Boundary, Popularity, Matchup Profile' :
            'Career Output (SR-heavy) + Peak ICC'
          }</strong></div>
        </div>
        <button onClick={onClose} style={{ marginTop:14,width:'100%',padding:10,fontSize:13,fontWeight:600,borderRadius:8,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#9ca3af' }}>
          Done
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   TAB 1: DESIGN APPROACH (blog)
═══════════════════════════════════════════════════════════════ */
function DesignTab() {
  return (
    <div style={{ maxWidth:720, margin:'0 auto', padding:'44px 28px 72px' }}>

      {/* HEADER */}
      <div style={{ marginBottom:52 }}>
        <div style={{ fontSize:10, letterSpacing:2, color:'#6366f1', fontWeight:700, marginBottom:14, textTransform:'uppercase' }}>
          Systems and Economy Design
        </div>
        <h1 style={{ fontSize:32, fontWeight:900, marginBottom:14, lineHeight:1.2, color:'#f1f5f9' }}>
          Player Card Rating System
        </h1>
        <p style={{ fontSize:16, color:'#6b7280', lineHeight:1.7 }}>
          Turning 500 real cricketers into cards that feel right to fans and balance right in a match.
        </p>
      </div>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* THE PROBLEM */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:18, color:'#f1f5f9' }}>The problem</h2>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:14 }}>
          Any sports collection game has to answer one question before it can answer anything else: what number goes on the card?
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:14 }}>
          Get it wrong in one direction and the game is statistically correct but feels broken. Get it wrong in the other and it feels good but the meta collapses, because ratings stop tracking anything a player can reason about.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:20 }}>
          The clearest version of this failure: if you build OVR directly off ICC rankings, Abhishek Sharma outranks Virat Kohli in T20I. That is accurate to current form and completely unacceptable to a cricket fan looking at a card. ICC rankings are a form tracker. A card rating is a claim about a player's identity.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:14 }}>So the design brief became:</p>
        <ol style={{ paddingLeft:22, color:'#d1d5db', fontSize:14, lineHeight:2 }}>
          <li>A single visible OVR per player, per format</li>
          <li>Credible to a fan who already has an opinion about that player</li>
          <li>Derived from real data, not hand-assigned</li>
          <li>Reproducible across 500+ players without manual curation</li>
          <li>Explainable in one sentence per card</li>
        </ol>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* WHY ONE STAT FAILS */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:18, color:'#f1f5f9' }}>Why one stat is not enough</h2>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:14 }}>
          The first instinct is batting average. It fails immediately in T20, where a 45 average at 118 strike rate is a worse card than a 28 average at 165.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:14 }}>
          Strike rate alone fails too. It rewards tail-end cameos. A number 9 with 6 innings and a 190 SR will beat a top-order anchor every time.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
          Every single metric I tested had a player it embarrassed. The fix was not a better metric. It was accepting that OVR is a composite of separate claims about a player, and making each claim a named, weighted input.
        </p>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* THE SEVEN PILLARS */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:10, color:'#f1f5f9' }}>The seven pillars</h2>
        <p style={{ color:'#6b7280', fontSize:13, lineHeight:1.7, marginBottom:28 }}>
          Every pillar is normalised to 0-100 against fixed historical floors and ceilings, then combined and mapped onto a bounded OVR scale.
        </p>

        {/* Summary table */}
        <div style={{ overflowX:'auto', borderRadius:10, border:'1px solid rgba(255,255,255,0.07)', marginBottom:40 }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
            <thead>
              <tr style={{ background:'rgba(255,255,255,0.025)', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
                <th style={{ padding:'10px 14px', textAlign:'left', color:'#6b7280', fontWeight:600 }}>#</th>
                <th style={{ padding:'10px 14px', textAlign:'left', color:'#6b7280', fontWeight:600 }}>Pillar</th>
                <th style={{ padding:'10px 14px', textAlign:'center', color:'#6b7280', fontWeight:600 }}>Weight</th>
                <th style={{ padding:'10px 14px', textAlign:'left', color:'#6b7280', fontWeight:600 }}>What it answers</th>
              </tr>
            </thead>
            <tbody>
              {[
                ['1','📊 Career Output',      '25%','#22c55e','How productive is this player over a career?'],
                ['2','🏆 Peak ICC Rating',    '20%','#a855f7','How high did they ever climb?'],
                ['3','⭐ Popularity',         '15%','#f97316','Does the fan expect this player to be good?'],
                ['4','🎯 Role Reliability',   '10%','#3b82f6','Do they show up consistently in their role?'],
                ['5','⚔️ Opposition Quality', '10%','#ef4444','Did they do it against real teams?'],
                ['6','🔄 Matchup Profile',    '10%','#06b6d4','Are they good against both pace and spin?'],
                ['7','📈 Current Form',       '10%','#eab308','Are they good right now?'],
              ].map(([n, name, weight, color, q]) => (
                <tr key={n} style={{ borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
                  <td style={{ padding:'10px 14px', color:'#374151', fontWeight:600 }}>{n}</td>
                  <td style={{ padding:'10px 14px', color, fontWeight:700 }}>{name}</td>
                  <td style={{ padding:'10px 14px', textAlign:'center', fontWeight:900, color }}>{weight}</td>
                  <td style={{ padding:'10px 14px', color:'#9ca3af' }}>{q}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Pillar detail write-ups */}
        <div style={{ display:'flex', flexDirection:'column', gap:36 }}>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#22c55e', marginBottom:10 }}>1. Career Output (25%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:10 }}>Three sub-inputs, weighted internally:</p>
            <ul style={{ paddingLeft:22, color:'#d1d5db', fontSize:14, lineHeight:2, marginBottom:10 }}>
              <li>Batting average, normalised across a 22 to 52 band, 35% of the pillar</li>
              <li>Strike rate, normalised across 118 to 172, 40% of the pillar</li>
              <li>Boundary percentage, normalised across 25 to 65, 25% of the pillar</li>
            </ul>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              Strike rate carries the most weight because the target product is a short-format game. In a 2-over match, scoring rate is the dominant contributor to a result. Boundary percentage is included separately because it captures ceiling in a way that strike rate averages away.
            </p>
          </div>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#a855f7', marginBottom:10 }}>2. Peak ICC Rating (20%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              Normalised across a 700 to 920 band. This is the legacy anchor. It is what stops a player who dominated for six years from being demoted because of a bad eighteen months. It is also the single pillar that most closely matches how fans actually rank players in conversation.
            </p>
          </div>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#f97316', marginBottom:10 }}>3. Popularity (15%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:10 }}>
              Log-scaled Instagram following. This is the pillar that gets the most pushback, so the reasoning matters.
            </p>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:10 }}>
              A card rating is a product surface, not a scientific claim. If the game tells a player that a household name is a 74, the player does not conclude the household name has declined. They conclude the rating system is broken and stop trusting every other number in the game. Popularity is included as an explicit, bounded, visible input rather than as a thumb on the scale during manual review.
            </p>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              It is log-scaled because follower counts span three orders of magnitude and a linear scale would let two or three global superstars flatten everyone else into noise.
            </p>
          </div>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#3b82f6', marginBottom:10 }}>4. Role Reliability (10%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              Combines how often the player is in the XI, not-out percentage, and batting position consistency. This is what separates a fixed top-order batter from a floating utility pick with a similar average.
            </p>
          </div>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#ef4444', marginBottom:10 }}>5. Opposition Quality (10%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              Records are filtered to performances against the top 10 ranked opposition, then weighted by country strength. Runs against a full-strength attack are worth more than runs padded against associate nations.
            </p>
          </div>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#06b6d4', marginBottom:10 }}>6. Matchup Profile (10%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              Separate vs pace and vs spin ratings, averaged into the pillar. These are also surfaced on the card as visible attributes rather than being buried inside OVR, because matchup is actionable information for squad building and OVR is not.
            </p>
          </div>

          <div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#eab308', marginBottom:10 }}>7. Current Form (10%)</h3>
            <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
              Current ICC rating. Deliberately the smallest weight it can be while still moving the number. Form should make a card breathe across a season, not rewrite a player's identity. This is the only pillar adjusted by the year slider.
            </p>
          </div>
        </div>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* FORMAT WEIGHT MATRIX */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:10, color:'#f1f5f9' }}>Format weight matrix</h2>
        <p style={{ color:'#6b7280', fontSize:13, lineHeight:1.7, marginBottom:20 }}>
          The same seven pillars are used across all formats, but their weights shift significantly. Test buries Popularity and raises average-heavy Career Output. IPL does the opposite.
        </p>
        <div style={{ overflowX:'auto', borderRadius:10, border:'1px solid rgba(255,255,255,0.07)' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
            <thead>
              <tr style={{ borderBottom:'1px solid rgba(255,255,255,0.08)', background:'rgba(255,255,255,0.02)' }}>
                <th style={{ padding:'10px 14px', textAlign:'left', color:'#6b7280', fontWeight:600, whiteSpace:'nowrap' }}>Pillar</th>
                {FORMAT_KEYS.map(f => (
                  <th key={f} style={{ padding:'10px 10px', textAlign:'center', color:'#9ca3af', fontWeight:700, whiteSpace:'nowrap' }}>
                    {FORMAT_CONFIG[f].emoji} {f}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {PILLAR_KEYS.map((key, i) => {
                const { label, color, icon } = PILLAR_META[key];
                const vals = FORMAT_KEYS.map(f => FORMAT_CONFIG[f].weights[key] || 0);
                const maxVal = Math.max(...vals);
                return (
                  <tr key={key} style={{ borderBottom:'1px solid rgba(255,255,255,0.04)', background: i%2===0 ? 'rgba(255,255,255,0.01)' : 'transparent' }}>
                    <td style={{ padding:'10px 14px', color, fontWeight:700, whiteSpace:'nowrap' }}>{icon} {label}</td>
                    {vals.map((v, j) => (
                      <td key={j} style={{ padding:'10px 10px', textAlign:'center', fontWeight: v===maxVal ? 900 : 400, color: v===maxVal ? color : '#4b5563' }}>
                        {v}%
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <p style={{ fontSize:11, color:'#374151', marginTop:10 }}>Highlighted value in each row = highest weight for that pillar across all formats.</p>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* CALIBRATION */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:18, color:'#f1f5f9' }}>Calibration problems and fixes</h2>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:28 }}>
          Two structural failures showed up only after running the model across the full player set.
        </p>

        <h3 style={{ fontSize:16, fontWeight:800, color:'#f1f5f9', marginBottom:10 }}>Cameo inflation</h3>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:28 }}>
          Tail-end bowlers with tiny sample sizes were ranking in the top ten. A bowler with 6 innings and two lucky slogs looked elite on rate stats. Fixed with a minimum innings threshold against top 10 opposition. Players below the threshold are excluded from the rated pool and written out separately for review rather than silently dropped.
        </p>

        <h3 style={{ fontSize:16, fontWeight:800, color:'#f1f5f9', marginBottom:10 }}>Over-penalising specialists</h3>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:20 }}>
          The first innings-weight curve had a hard floor for anyone under 50 innings. This was meant to protect against small samples but it was punishing legitimate modern T20 specialists relative to long-career veterans, purely for having played in a shorter era. Fixed with a softer curve:
        </p>

        <div style={{ display:'inline-block', borderRadius:10, overflow:'hidden', border:'1px solid rgba(255,255,255,0.07)', marginBottom:20 }}>
          <table style={{ borderCollapse:'collapse', fontSize:13 }}>
            <thead>
              <tr style={{ background:'rgba(255,255,255,0.025)', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
                <th style={{ padding:'9px 22px', textAlign:'left', color:'#6b7280', fontWeight:600 }}>Innings vs Top 10</th>
                <th style={{ padding:'9px 22px', textAlign:'center', color:'#6b7280', fontWeight:600 }}>Weight</th>
              </tr>
            </thead>
            <tbody>
              {[['100+','1.00'],['50 to 99','0.95'],['30 to 49','0.90'],['15 to 29','0.85'],['Under 15','0.75']].map(([inn,w]) => (
                <tr key={inn} style={{ borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
                  <td style={{ padding:'9px 22px', color:'#d1d5db' }}>{inn}</td>
                  <td style={{ padding:'9px 22px', textAlign:'center', fontWeight:800, color:'#22c55e' }}>{w}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
          Both fixes came from reading the output list top to bottom and asking a single question about each row: would a cricket fan argue with this? Every argument was a bug.
        </p>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* WHAT THE PROTOTYPE DOES */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:18, color:'#f1f5f9' }}>What the prototype does</h2>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:10 }}>An interactive tool that:</p>
        <ul style={{ paddingLeft:22, color:'#d1d5db', fontSize:14, lineHeight:2, marginBottom:14 }}>
          <li>Renders generated player cards with OVR and the visible sub-attributes</li>
          <li>Exposes every pillar weight as a live control</li>
          <li>Recalculates and reorders the full player list in real time as weights change</li>
          <li>Shows the pillar breakdown behind any single card, so any rating can be traced back to its inputs</li>
        </ul>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
          The point of making the weights live is that it turns a static formula into an argument you can have. Drag popularity to zero and watch the leaderboard become statistically defensible and commercially unusable. That tradeoff is easier to demonstrate than to describe.
        </p>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* WHAT I WOULD CHANGE */}
      <section style={{ marginBottom:52 }}>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:18, color:'#f1f5f9' }}>What I would change</h2>

        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:20 }}>
          <strong style={{ color:'#d1d5db' }}>Popularity is a proxy, not a measure.</strong> Instagram following correlates with fame but also with market size and social media habits. A regionally beloved player in a smaller cricket nation is undervalued. A proper reputation index would blend search volume, jersey sales, and broadcast appearances.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:20 }}>
          <strong style={{ color:'#d1d5db' }}>Format-specific cards, not one universal rating.</strong> The gap between formats is large enough that a single OVR misrepresents most players. A Test specialist and a T20 specialist should not share a number.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85, marginBottom:20 }}>
          <strong style={{ color:'#d1d5db' }}>Bowling parity.</strong> The seven pillars are tuned for batting. Bowling needs its own pillar set with economy and phase usage carrying the weight that strike rate carries here, not a mirrored version of the batting model.
        </p>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
          <strong style={{ color:'#d1d5db' }}>The card type layer.</strong> The cleanest long-term answer to the form vs legacy tension is not a better single formula. It is separating base cards, peak-moment cards, and legend cards, and letting each one make a different claim.
        </p>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid rgba(255,255,255,0.07)', marginBottom:48 }} />

      {/* TAKEAWAY */}
      <section>
        <h2 style={{ fontSize:22, fontWeight:800, marginBottom:18, color:'#f1f5f9' }}>Takeaway</h2>
        <p style={{ color:'#9ca3af', fontSize:14, lineHeight:1.85 }}>
          The hardest part of a rating system is never the math. It is deciding what the number should feel like to someone who already has an opinion, then defending that against balance requirements. Every weight in this model is a position on that tradeoff, and every one of them is written down and adjustable rather than buried in a spreadsheet.
        </p>
      </section>
    </div>
  );
}

function HowToTab() {

/* ═══════════════════════════════════════════════════════════════
   PLAYER DATABASE (inside Generator tab)
═══════════════════════════════════════════════════════════════ */
function PlayerDatabase({ format, year, weights, onSelectPlayer }) {
  const [dbQuery,    setDbQuery]    = useState('');
  const [roleFilter, setRoleFilter] = useState('All');

  const roles = ['All', 'Batsman', 'WK-Batsman', 'Bowler', 'All-rounder'];

  const eligibleCount = useMemo(() =>
    PLAYERS.filter(p => year >= p.ay[0] && isPlayerEligible(p, format).ok).length
  , [format, year]);

  const rows = useMemo(() => {
    const q = dbQuery.toLowerCase().trim();
    return PLAYERS
      .filter(p => {
        if (year < p.ay[0]) return false;                      // hasn't debuted yet
        if (!isPlayerEligible(p, format).ok) return false;    // league restriction
        if (q && !p.name.toLowerCase().includes(q) && !p.country.toLowerCase().includes(q) && !p.code.toLowerCase().includes(q)) return false;
        if (roleFilter !== 'All' && p.role !== roleFilter) return false;
        return true;
      })
      .map(p => {
        const c = buildCard(p, format, year, weights);
        return { player:p, ovr:c.ovr, yf:c.yf, tier:getTier(c.ovr) };
      })
      .sort((a, b) => b.ovr - a.ovr);
  }, [format, year, weights, dbQuery, roleFilter]);

  return (
    <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)', paddingTop:32, marginTop:8 }}>
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14, flexWrap:'wrap', gap:8 }}>
        <div style={{ fontSize:11, color:'#4b5563', letterSpacing:2, fontWeight:700, textTransform:'uppercase' }}>
          Player Database: {FORMAT_CONFIG[format].emoji} {FORMAT_CONFIG[format].label} · {year}
        </div>
        <div style={{ fontSize:11, color:'#374151' }}>
          {rows.length} shown
          {eligibleCount < PLAYERS.length && (
            <span style={{ color:'#f97316', marginLeft:6 }}>
              ({PLAYERS.length - eligibleCount} ineligible for {FORMAT_CONFIG[format].label})
            </span>
          )}
        </div>
      </div>
      {FORMAT_RESTRICTIONS[format] && (
        <div style={{ marginBottom:14, fontSize:11, color:'#fb923c', background:'rgba(249,115,22,0.07)', border:'1px solid rgba(249,115,22,0.18)', borderRadius:7, padding:'7px 13px' }}>
          {FORMAT_RESTRICTIONS[format].note}
        </div>
      )}

      {/* Filters */}
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', alignItems:'center', marginBottom:18 }}>
        <input
          type="text"
          placeholder="Filter by name or country…"
          value={dbQuery}
          onChange={e => setDbQuery(e.target.value)}
          style={{
            padding:'7px 14px', fontSize:12, borderRadius:8,
            background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)',
            color:'#e5e7eb', width:200
          }}
        />
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {roles.map(r => (
            <button key={r} onClick={() => setRoleFilter(r)} style={{
              padding:'5px 11px', fontSize:11, fontWeight:700, borderRadius:6,
              background: roleFilter===r ? 'rgba(99,102,241,0.18)' : 'rgba(255,255,255,0.04)',
              border: `1px solid ${roleFilter===r ? '#6366f1' : 'rgba(255,255,255,0.07)'}`,
              color: roleFilter===r ? '#818cf8' : '#6b7280',
            }}>{r}</button>
          ))}
        </div>
      </div>

      {/* Table */}
      <div style={{ overflowX:'auto', borderRadius:10, border:'1px solid rgba(255,255,255,0.07)' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
          <thead>
            <tr style={{ background:'rgba(255,255,255,0.025)', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
              <th style={{ padding:'9px 12px', textAlign:'left', color:'#4b5563', fontWeight:600, width:36 }}>#</th>
              <th style={{ padding:'9px 12px', textAlign:'left', color:'#4b5563', fontWeight:600 }}>Player</th>
              <th style={{ padding:'9px 12px', textAlign:'left', color:'#4b5563', fontWeight:600 }}>Country</th>
              <th style={{ padding:'9px 12px', textAlign:'left', color:'#4b5563', fontWeight:600 }}>Role</th>
              <th style={{ padding:'9px 14px', textAlign:'center', color:'#4b5563', fontWeight:600 }}>OVR</th>
              <th style={{ padding:'9px 14px', textAlign:'center', color:'#4b5563', fontWeight:600 }}>Era</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(({ player:p, ovr, yf, tier }, i) => (
              <tr key={p.id} className="db-row"
                onClick={() => onSelectPlayer(p)}
                title={`Generate ${p.name} card`}
                style={{ borderBottom:'1px solid rgba(255,255,255,0.035)', background: i%2===0 ? 'rgba(255,255,255,0.012)' : 'transparent' }}>
                <td style={{ padding:'9px 12px', color:'#374151', fontWeight:600 }}>{i+1}</td>
                <td style={{ padding:'9px 12px' }}>
                  <span style={{ marginRight:8, fontSize:15 }}>{p.flag}</span>
                  <span style={{ fontWeight:700, color:'#e5e7eb' }}>{p.name}</span>
                </td>
                <td style={{ padding:'9px 12px', color:'#6b7280' }}>{p.country}</td>
                <td style={{ padding:'9px 12px', color:'#6b7280' }}>{p.role}</td>
                <td style={{ padding:'9px 14px', textAlign:'center' }}>

                </td>

                  <span style={{
                    fontSize:9, fontWeight:800, letterSpacing:0.5, padding:'2px 8px', borderRadius:10,
                    background:'rgba(255,255,255,0.06)',
                    color: yf.badge==='PEAK' ? '#86efac' : yf.badge==='RISING' ? '#93c5fd' : yf.badge==='RETIRED' ? '#ef4444' : '#fdba74'

        </table>
        {rows.length === 0 && (
          <div style={{ padding:'24px', textAlign:'center', color:'#374151', fontSize:13 }}>No players match this filter.</div>
        )}
      </div>
      <div style={{ marginTop:10, fontSize:11, color:'#374151' }}>Click any row to generate that player's card and see their OVR history graph.</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   OVR HISTORY PANEL (inline, right column of result area)
═══════════════════════════════════════════════════════════════ */
function OVRHistoryPanel({ card }) {
  const player = card.player;
  const format = card.format;
  const year   = card.year;

  const yearStart = player.ay[0];
  const yearEnd   = Math.min(player.ay[1] + 4, 2026);

  const graphYears = useMemo(() => {
    const ys = [];
    for (let y = yearStart; y <= yearEnd; y++) ys.push(y);
    return ys;
  }, [yearStart, yearEnd]);

  const graphData = useMemo(() => {
    const wts = FORMAT_CONFIG[format].weights;
    return graphYears.map(y => {
      const c = buildCard(player, format, y, wts);
      return { year: y, ovr: c.ovr, badge: c.yf.badge };
    });
  }, [player, format, graphYears]);

  const clampedYear = Math.max(yearStart, Math.min(yearEnd, year));
  const currentData = graphData.find(d => d.year === clampedYear) || graphData[0];

  const SVG_W = 480, SVG_H = 200;
  const PL = 40, PR = 12, PT = 16, PB = 32;
  const CW = SVG_W - PL - PR, CH = SVG_H - PT - PB;
  const n  = graphYears.length;

  const xs = y => n <= 1 ? PL + CW / 2
    : PL + ((y - graphYears[0]) / (graphYears[n - 1] - graphYears[0])) * CW;
  const ys = ovr => PT + CH - ((ovr - 60) / 39) * CH;

  const ERA_ZONE = {
    'RISING':      'rgba(59,130,246,0.10)',
    'PEAK':        'rgba(34,197,94,0.14)',
    'VETERAN':     'rgba(234,179,8,0.10)',
    'LATE CAREER': 'rgba(249,115,22,0.10)',
    'RETIRED':     'rgba(239,68,68,0.08)',
  };
  const ERA_DOT = {
    'RISING':      '#60a5fa',
    'PEAK':        '#4ade80',
    'VETERAN':     '#fbbf24',
    'LATE CAREER': '#fb923c',
    'RETIRED':     '#f87171',
    'PRE-CAREER':  '#9ca3af',
  };

  const gridOVRs = [65, 70, 75, 80, 85, 90, 95];
  const xStep    = n > 30 ? 5 : n > 15 ? 3 : n > 8 ? 2 : 1;

  return (
    <div style={{
      flex: '1 1 340px', minWidth: 300,
      background: 'rgba(255,255,255,0.025)',
      border: '1px solid rgba(255,255,255,0.07)',
      borderRadius: 12, padding: '16px 18px',
    }}>
      <div style={{ fontSize:10, color:'#4b5563', letterSpacing:1.5, fontWeight:700, marginBottom:12, textTransform:'uppercase' }}>
        OVR over the years · {FORMAT_CONFIG[format].label}
      </div>

      {graphYears.length >= 2 ? (
        <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`}
          style={{ width:'100%', height:'auto', display:'block', borderRadius:6 }}>

          {/* Era zone bands */}
          {graphData.map((d, i) => {
            const x1 = i === 0 ? PL : (xs(d.year) + xs(graphData[i - 1].year)) / 2;
            const x2 = i === graphData.length - 1 ? PL + CW : (xs(d.year) + xs(graphData[i + 1].year)) / 2;
            return (
              <rect key={`z${i}`} x={x1} y={PT} width={Math.max(0, x2 - x1)} height={CH}
                fill={ERA_ZONE[d.badge] || 'transparent'} />
            );
          })}

          {/* Grid lines */}
          {gridOVRs.map(ovr => (
            <g key={ovr}>
              <line x1={PL} x2={PL + CW} y1={ys(ovr)} y2={ys(ovr)}
                stroke="rgba(255,255,255,0.06)" strokeWidth={1} />
              <text x={PL - 6} y={ys(ovr)} textAnchor="end" fontSize="9"
                fill="#374151" dominantBaseline="middle">{ovr}</text>
            </g>
          ))}

          {/* Axes */}
          <line x1={PL} x2={PL + CW} y1={PT + CH} y2={PT + CH} stroke="rgba(255,255,255,0.08)" strokeWidth={1} />
          <line x1={PL} x2={PL} y1={PT} y2={PT + CH} stroke="rgba(255,255,255,0.08)" strokeWidth={1} />

          {/* X-axis labels */}
          {graphYears.filter((y, i) => i % xStep === 0 || i === graphYears.length - 1).map(y => (
            <text key={y} x={xs(y)} y={PT + CH + 18} textAnchor="middle" fontSize="9" fill="#374151">{y}</text>
          ))}

          {/* Current year marker */}
          <line x1={xs(clampedYear)} x2={xs(clampedYear)} y1={PT} y2={PT + CH}
            stroke="rgba(255,255,255,0.35)" strokeWidth={1.5} strokeDasharray="4,3" />

          {/* OVR line */}
          <polyline
            points={graphData.map(d => `${xs(d.year).toFixed(1)},${ys(d.ovr).toFixed(1)}`).join(' ')}
            fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth={1.5} />

          {/* Dots */}
          {graphData.map((d, i) => {
            const isCurrent = d.year === clampedYear;
            const cx = xs(d.year), cy = ys(d.ovr);
            const dc = ERA_DOT[d.badge] || '#6b7280';
            return (
              <g key={i}>
                {isCurrent && <circle cx={cx} cy={cy} r={9} fill={dc} opacity={0.15} />}
                <circle cx={cx} cy={cy} r={isCurrent ? 5 : 3}
                  fill={dc}
                  stroke={isCurrent ? '#fff' : 'rgba(14,24,41,0.85)'}
                  strokeWidth={isCurrent ? 1.5 : 0.8} />
                <title>{d.year}: OVR {d.ovr} ({d.badge})</title>
              </g>
            );
          })}

          {/* Current year OVR label */}
          {(() => {
            if (!currentData) return null;
            const cx = xs(clampedYear), cy = ys(currentData.ovr);
            const labelY = cy - 12 < PT + 8 ? cy + 16 : cy - 12;
            return (
              <text x={cx} y={labelY} textAnchor="middle" fontSize="10"
                fontWeight="700" fill={ERA_DOT[currentData.badge] || '#fff'}>{currentData.ovr}</text>
            );
          })()}
        </svg>
      ) : (
        <div style={{ fontSize:12, color:'#374151', padding:'12px 0' }}>Only one year of data available.</div>
      )}

      {/* Era legend */}
      <div style={{ display:'flex', gap:12, flexWrap:'wrap', marginTop:10 }}>
        {[['RISING','#60a5fa'],['PEAK','#4ade80'],['VETERAN','#fbbf24'],['LATE CAREER','#fb923c'],['RETIRED','#f87171']].map(([b, c]) => (
          <span key={b} style={{ fontSize:10, color:c, display:'flex', alignItems:'center', gap:4, fontWeight:700 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:c, display:'inline-block' }} />
            {b}
          </span>
        ))}
      </div>

      {/* Note */}
      <div style={{ fontSize:10, lineHeight:1.65, color:'#374151', marginTop:12 }}>
        Only Current Form (10%) is era-adjusted. The other six pillars use career-aggregate data, which is why the curve stays relatively flat.
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [activeTab,   setActiveTab]   = useState(2);

  // Generator state
  const [query,       setQuery]       = useState('');
  const [format,      setFormat]      = useState('T20I');
  const [year,        setYear]        = useState(2024);
  const [suggestions, setSuggestions] = useState([]);
  const [showSugg,    setShowSugg]    = useState(false);
  const [generating,  setGenerating]  = useState(false);
  const [genError,    setGenError]    = useState('');
  const [card,        setCard]        = useState(null);
  const [isNew,       setIsNew]       = useState(false);
  const [displayOVR,  setDisplayOVR]  = useState(60);
  const [collection,  setCollection]  = useState([]);
  const [weights,     setWeights]     = useState({ ...FORMAT_CONFIG['T20I'].weights });
  const [showWeights, setShowWeights] = useState(false);
  const inputRef = useRef(null);

  const foundPlayer = useMemo(() => findPlayer(query), [query]);

  const changeWeight = useCallback((key, val) => setWeights(p => ({ ...p, [key]: val })), []);

  const handleQueryChange = (val) => {
    setQuery(val);
    setGenError('');
    const suggs = getSuggestions(val);
    setSuggestions(suggs);
    setShowSugg(suggs.length > 0 && val.length >= 2);
  };

  const selectSuggestion = (player) => {
    setQuery(player.name);
    setSuggestions([]);
    setShowSugg(false);
    inputRef.current?.focus();
  };

  const handleFormatChange = (f) => {
    setFormat(f);
    setWeights({ ...FORMAT_CONFIG[f].weights });
  };

  const runGenerate = async (player, useFormat) => {
    setGenerating(true);
    setCard(null);
    setGenError('');
    await new Promise(r => setTimeout(r, 900));
    const fmt = useFormat ?? format;
    const wts = useFormat ? { ...FORMAT_CONFIG[useFormat].weights } : weights;
    const result = buildCard(player, fmt, year, wts);
    setCard(result);
    setIsNew(true);
    setGenerating(false);
    setDisplayOVR(60);
    const target = result.ovr;
    const step   = Math.max(1, Math.ceil((target - 60) / 25));
    let cur      = 60;
    const t = setInterval(() => {
      cur = Math.min(cur + step, target);
      setDisplayOVR(cur);
      if (cur >= target) clearInterval(t);
    }, 35);
  };

  const handleGenerate = async () => {
    if (!query.trim()) { setGenError('Enter a player name to generate a card.'); return; }
    const player = findPlayer(query);
    if (!player) {
      setGenError(`"${query}" not found. Try: ${PLAYERS.slice(0,3).map(p=>p.name).join(', ')}…`);
      return;
    }
    // Year range check
    if (year < player.ay[0]) {
      setGenError(`No data for ${player.name} in ${year}. Career started in ${player.ay[0]}. Adjust the year slider or click "Jump to debut year".`);
      return;
    }
    // League eligibility check
    const elig = isPlayerEligible(player, format);
    if (!elig.ok) {
      setGenError(elig.reason);
      return;
    }
    await runGenerate(player);
  };

  const handleSelectFromDB = (player) => {
    setQuery(player.name);
    window.scrollTo({ top:0, behavior:'smooth' });
    runGenerate(player);
  };

  const saveCard = () => {
    if (!card) return;
    const dup = collection.find(c =>
      c.player.id === card.player.id && c.format === card.format && c.year === card.year
    );
    if (!dup) setCollection(prev => [card, ...prev]);
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh', flexDirection:'column' }}>

      {/* ── HEADER + TAB NAV ── */}
      <div style={{ background:'#0a1220', borderBottom:'1px solid rgba(255,255,255,0.06)', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ padding:'12px 28px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <span style={{ fontSize:18, fontWeight:900, letterSpacing:-0.5 }}>🏏 Cricket Card Generator</span>
            <span style={{ fontSize:11, color:'#374151', marginLeft:14 }}>{PLAYERS.length} players · 7 pillars · 7 formats</span>
          </div>
          {activeTab === 2 && (
            <button onClick={() => setShowWeights(true)} style={{
              padding:'6px 14px', fontSize:12, fontWeight:700, borderRadius:8,
              background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', color:'#9ca3af'
            }}>⚙️ Adjust Weights</button>
          )}
        </div>
        <div style={{ display:'flex', padding:'0 18px', marginTop:2 }}>
          {[[0,'📐 Design Approach'],[1,'📖 How to Use'],[2,'⚡ Generator']].map(([idx, label]) => (
            <button key={idx}
              className={`tab-nav-btn${activeTab===idx?' active':''}`}
              onClick={() => setActiveTab(idx)}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* ── TAB CONTENT ── */}
      {activeTab === 0 && <DesignTab />}
      {activeTab === 1 && <HowToTab />}
      {activeTab === 2 && (
        <div style={{ display:'flex', flexDirection:'column', flex:1 }}>

          {/* ── GENERATOR PANEL ── */}
          <div style={{ background:'#0d1628', borderBottom:'1px solid rgba(255,255,255,0.05)', padding:'24px 28px 20px' }}>
            {/* Search + Year + Generate */}
            <div style={{ display:'flex', gap:12, alignItems:'flex-start', flexWrap:'wrap', marginBottom:16 }}>
              <div style={{ position:'relative', flex:1, minWidth:260, maxWidth:380 }}>
                <input
                  ref={inputRef} type="text"
                  placeholder="Player name (e.g. Virat Kohli, Warne)…"
                  value={query}
                  onChange={e => handleQueryChange(e.target.value)}
                  onKeyDown={e => { if (e.key==='Enter') { setShowSugg(false); handleGenerate(); } if (e.key==='Escape') setShowSugg(false); }}
                  onFocus={() => query.length >= 2 && setShowSugg(suggestions.length > 0)}
                  style={{
                    width:'100%', padding:'11px 16px', fontSize:14, borderRadius:10,
                    background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)',
                    color:'#e5e7eb'
                  }}
                />
                {showSugg && (
                  <div style={{
                    position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:200,
                    background:'#131f38', border:'1px solid rgba(255,255,255,0.08)',
                    borderRadius:10, overflow:'hidden', boxShadow:'0 8px 32px rgba(0,0,0,0.6)'
                  }}>
                    {suggestions.map(p => (
                      <div key={p.id} className="suggestion-item"
                        onMouseDown={() => selectSuggestion(p)}
                        style={{ padding:'10px 14px', cursor:'pointer', display:'flex', alignItems:'center', gap:10, fontSize:13 }}>
                        <span style={{ fontSize:20 }}>{p.flag}</span>
                        <div>
                          <div style={{ fontWeight:700 }}>{p.name}</div>
                          <div style={{ fontSize:11, color:'#6b7280' }}>{p.country} · {p.role}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              {/* Career year hint */}
              {foundPlayer && (
                <div style={{ marginTop:6, fontSize:10, color:'#6b7280', display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
                  <span>{foundPlayer.flag} {foundPlayer.country} · {foundPlayer.role}</span>
                  <span style={{
                    background: year < foundPlayer.ay[0] ? 'rgba(239,68,68,0.12)' : 'rgba(255,255,255,0.06)',
                    border: `1px solid ${year < foundPlayer.ay[0] ? 'rgba(239,68,68,0.3)' : 'rgba(255,255,255,0.08)'}`,
                    color: year < foundPlayer.ay[0] ? '#f87171' : '#6b7280',
                    padding:'1px 8px', borderRadius:6, fontWeight:700,
                  }}>
                    Career: {foundPlayer.ay[0]}–{foundPlayer.ay[1] >= 2026 ? 'present' : foundPlayer.ay[1]}
                  </span>
                  {year < foundPlayer.ay[0] && (
                    <button onClick={() => setYear(foundPlayer.ay[0])} style={{
                      fontSize:10, padding:'2px 9px', borderRadius:6, fontWeight:700,
                      background:'rgba(99,102,241,0.15)', border:'1px solid rgba(99,102,241,0.3)', color:'#818cf8'
                    }}>Jump to debut year</button>
                  )}
                </div>
              )}
              </div>

              {/* Year selector */}
              <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:10, padding:'8px 14px', minWidth:160 }}>
                <div style={{ fontSize:10, color:'#6b7280', letterSpacing:1, marginBottom:6 }}>YEAR</div>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <button onClick={() => setYear(y => Math.max(1985, y - 1))} style={{ background:'rgba(255,255,255,0.08)', border:'none', color:'#9ca3af', width:24, height:24, borderRadius:5, fontSize:14, display:'flex', alignItems:'center', justifyContent:'center' }}>‹</button>
                  <span style={{ fontWeight:900, fontSize:18, minWidth:44, textAlign:'center' }}>{year}</span>
                  <button onClick={() => setYear(y => Math.min(2026, y + 1))} style={{ background:'rgba(255,255,255,0.08)', border:'none', color:'#9ca3af', width:24, height:24, borderRadius:5, fontSize:14, display:'flex', alignItems:'center', justifyContent:'center' }}>›</button>
                </div>
                <input type="range" min={1985} max={2026} value={year} onChange={e=>setYear(+e.target.value)}
                  style={{ accentColor:'#a855f7', marginTop:6 }} />
              </div>

              {/* Generate button */}
              <button className="gen-btn" onClick={handleGenerate} disabled={generating} style={{
                padding:'0 28px', height:52, fontSize:15, fontWeight:800, borderRadius:10,
                background:'linear-gradient(135deg,#1d4ed8,#7c3aed)',
                border:'none', color:'#fff', letterSpacing:0.5,
                boxShadow:'0 4px 20px rgba(124,58,237,0.35)',
                display:'flex', alignItems:'center', gap:10
              }}>
                {generating ? (
                  <>
                    <span style={{ display:'inline-block', width:16, height:16, border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'#fff', borderRadius:'50%', animation:'spin 0.7s linear infinite' }} />
                    Computing…
                  </>
                ) : '⚡ Generate Card'}
              </button>
            </div>

            {/* Format tabs */}
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {FORMAT_KEYS.map(f => {
                const fc = FORMAT_CONFIG[f];
                const active = format === f;
                return (
                  <button key={f} className="format-btn" onClick={() => handleFormatChange(f)} style={{
                    padding:'7px 16px', fontSize:12, fontWeight:700, borderRadius:8,
                    background: active ? 'rgba(99,102,241,0.2)' : 'rgba(255,255,255,0.04)',
                    border: `1px solid ${active ? '#6366f1' : 'rgba(255,255,255,0.08)'}`,
                    color: active ? '#818cf8' : '#6b7280',
                  }}>{fc.emoji} {fc.label}</button>
                );
              })}
            </div>

            {genError && (
              <div style={{ marginTop:12, fontSize:12, color:'#f87171', background:'rgba(239,68,68,0.08)', border:'1px solid rgba(239,68,68,0.2)', padding:'8px 14px', borderRadius:8 }}>
                {genError}
              </div>
            )}
          </div>

          {/* ── RESULT AREA ── */}
          <div style={{ flex:1, padding:'28px 28px 0' }}>
            {/* Generated card + breakdown */}
            {card && (
              <div style={{ display:'flex', gap:32, flexWrap:'wrap', marginBottom:32, alignItems:'flex-start' }}>
                <div style={{ display:'flex', flexDirection:'column', gap:14, alignItems:'center' }}>
                  <BigCard card={card} displayOVR={displayOVR} isNew={isNew} />
                  <button onClick={saveCard} style={{
                    padding:'9px 20px', fontSize:12, fontWeight:700, borderRadius:8,
                    background:'rgba(34,197,94,0.12)', border:'1px solid rgba(34,197,94,0.25)', color:'#22c55e'
                  }}>+ Save to Collection</button>
                </div>
                <BreakdownPanel card={card} />
                <OVRHistoryPanel card={card} />
              </div>
            )}

            {/* Empty state */}
            {!card && !generating && (
              <div style={{ textAlign:'center', padding:'40px 0', color:'#1f2937' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>🏏</div>
                <div style={{ fontSize:15, fontWeight:700, color:'#374151', marginBottom:6 }}>Enter a player name and click Generate</div>
                <div style={{ fontSize:13, color:'#1f2937' }}>Or click any row in the database below</div>
              </div>
            )}

            {/* ── COLLECTION ── */}
            {collection.length > 0 && (
              <div style={{ marginBottom:32 }}>
                <div style={{ fontSize:11, color:'#4b5563', letterSpacing:2, fontWeight:700, textTransform:'uppercase', marginBottom:14 }}>
                  Your Collection ({collection.length})
                </div>
                <div className="collection-scroll">
                  {collection.map((c, i) => (
                    <CollectionMini key={i} card={c} onSelect={c => {
                      setCard(c); setDisplayOVR(c.ovr); setIsNew(false);
                      window.scrollTo({ top:0, behavior:'smooth' });
                    }} />
                  ))}
                </div>
              </div>
            )}

            {/* ── PLAYER DATABASE ── */}
            <PlayerDatabase
              format={format}
              year={year}
              weights={weights}
              onSelectPlayer={handleSelectFromDB}
            />

            <div style={{ height:48 }} />
          </div>
        </div>
      )}

      {/* ── WEIGHT MODAL ── */}
      {showWeights && (
        <WeightModal
          weights={weights}
          format={format}
          onChange={changeWeight}
          onClose={() => setShowWeights(false)}
          onReset={() => setWeights({ ...FORMAT_CONFIG[format].weights })}
        />
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
